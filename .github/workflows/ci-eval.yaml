name: Eval CI

on:
  push:
    tags:
      - 'eval-*'
    branches:
      - '**'
    paths:
      - '.github/workflows/ci-eval.yaml'
      - 'eval/**'
  pull_request:
    branches:
      - '**'
    paths:
      - '.github/workflows/ci-eval.yaml'
      - 'eval/**'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build only, do not push images or upload release assets'
        type: boolean
        default: false

permissions:
  contents: write          # for release assets
  packages: write          # push to GHCR
  id-token: write          # PyPI trusted publisher

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test & Build Wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version-file: "eval/pyproject.toml"

      - run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install -e "./eval[dev]"

      - working-directory: eval
        run: |
          set -o pipefail
          touch ./test-results.xml
          set +e
          source ../.venv/bin/activate
          pytest --junit-xml ./test-results.xml
          status=$?
          set -e
          if [ "$status" -ne 0 ] && [ "$status" -ne 5 ]; then
            exit "$status"
          fi

      - uses: dorny/test-reporter@v2
        if: ${{ !cancelled() }}
        with:
          name: eval-tests
          path: eval/test-results.xml
          reporter: python-xunit
          fail-on-error: 'true'
          fail-on-empty: 'false'

      - run: uv build eval

      - uses: actions/upload-artifact@v4
        with:
          name: eval-dist
          path: eval/dist/*
          if-no-files-found: error
          retention-days: 7

  build-docker-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test-and-build
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.repository == 'THUDM/AgentRL'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Login to GHCR
        if: github.repository != 'THUDM/AgentRL'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ github.repository == 'THUDM/AgentRL' && format('{0}/agentrl-eval', secrets.DOCKER_USER) || format('ghcr.io/{0}/eval', github.repository) }}
          tags: |
            type=match,pattern=eval-(.+),group=1
            type=ref,event=branch
            type=ref,event=pr

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./eval/Dockerfile
          platforms: |
            linux/amd64,linux/arm64
          push: ${{ !inputs.dry_run }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha,scope=eval-image
          cache-to: type=gha,mode=max,scope=eval-image

  publish-release:
    name: Publish PyPI & GitHub Release
    if: startsWith(github.ref, 'refs/tags/eval-') && !inputs.dry_run
    needs:
      - test-and-build
      - build-docker-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: eval-dist
          path: eval/dist

      - name: Publish to PyPI
        if: github.repository == 'THUDM/AgentRL'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages_dir: eval/dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: eval/dist/*
          generate_release_notes: true
