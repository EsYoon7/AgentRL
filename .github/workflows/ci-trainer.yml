name: Trainer CI

on:
  push:
    tags:
      - 'trainer-*'
    branches:
      - '**'
    paths:
      - '.github/workflows/ci-trainer.yml'
      - 'trainer/**'
  pull_request:
    branches:
      - '**'
    paths:
      - '.github/workflows/ci-trainer.yml'
      - 'trainer/**'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build only, do not publish to PyPI'
        type: boolean
        default: false

permissions:
  contents: write
  packages: write   # push to GHCR
  id-token: write   # for PyPI Trusted Publisher (recommended)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-package:
    name: Build Python Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '>=3.13'
          cache: 'pip'

      - run: python -m pip install --upgrade pip build packaging
      - run: python -m build trainer

      - uses: actions/upload-artifact@v4
        with:
          name: trainer-dist
          path: trainer/dist/*
          if-no-files-found: error
          retention-days: 7

      - if: startsWith(github.ref, 'refs/tags/trainer-') && !inputs.dry_run && github.repository == 'THUDM/AgentRL'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages_dir: trainer/dist

      - if: startsWith(github.ref, 'refs/tags/trainer-') && !inputs.dry_run
        uses: softprops/action-gh-release@v2
        with:
          files: trainer/dist/*
          generate_release_notes: true
