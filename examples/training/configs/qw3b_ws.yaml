model_path: /path/to/model/Qwen2.5-3B-Instruct
max_steps: 1000
bucket_size: 1.0e9
val_before_train: False
rollout_ratio: 0.5
run_name: qw3b-ws-out-fp32-tokmean
project_name: abc_rl
save_path: /path/to/output/ckpt/
save_interval: 100000
val_interval: 25
rollout_stale_ratio: 0.25
stale_step: 25
task_adv_norm: True
train:
  batch_size: 32
  concurrency: 1024
  n: 8
val:
  concurrency: 256
  n: 4
rollout:
  tp_size: 1
  server_args:
    disable_cuda_graph: True
  sampling_params:
    temperature: 0.8
    max_new_tokens: 1024
actor:
  loss_reduce_mode: token-mean
  max_tokens_per_micro_batch: 16384
  max_ckpt_to_keep: 1
  torch_dtype: float32
  enable_gradient_checkpointing: True
  reshard_after_forward: False
  model_input_keys:
    - input_ids
    - position_ids
  optim:
    lr: 1.0e-6
    weight_decay: 0
ref:
  torch_dtype: bfloat16
  reshard_after_forward: True
loss:
  temperature: 0.8
  use_kl_loss: True
  kl_loss_coef: 1.0e-4
  clip_ratio: 0.2
  clip_ratio_low: 0.2
  clip_ratio_high: 0.2
  clip_ratio_c: 3.0
  entropy_coef: 0.0
task:
  # url of the controller api here
  base_url: http://localhost:5020/api
  use_native_coroutine: True
  incomplete_punishment: -0.2
  max_total_len: 8192
  max_turns: 20
  train_tasks:
    - webshop-env_train
  val_tasks:
    - webshop-std
  loop_start_args:
    - name
    - index
advantage:
  adv_estimator: grpo
