controller:docker:
  extends:
    - .default-docker
    - .controller-rules
  needs:
    - controller:test
  variables:
    COMPONENT: controller
    DOCKERFILE: controller/Dockerfile
    VERSION_COMMAND: "git describe --tags --dirty --long --always --match 'controller-v*' | sed -E 's/^controller-//'"
    GIT_DEPTH: "0"

eval:docker:
  extends:
    - .default-docker
    - .eval-rules
  needs:
    - eval:package
  variables:
    COMPONENT: eval
    DOCKERFILE: eval/Dockerfile
